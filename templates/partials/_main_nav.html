<nav class="main-nav">
  <span class="main-nav-welcome">Academia Gamificada de Ciberseguridad</span>
  <div class="auth-links">
    {% if user.is_authenticated %}
      <span style="color: white; font-size: 13px; margin-right: 10px;">Hola, {{ user.username }}</span>
      <form action="{% url 'logout' %}" method="post" style="display: inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-ghost">Salir</button>
      </form>
    {% else %}
      <a href="/login/" class="btn btn-ghost">Ingresar</a>
      <a href="/signup/" class="btn btn-primary">Registrarse</a>
    {% endif %}
  </div>
</nav>
